<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>燃香样式判断 - 登录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
        }
        
        .login-container {
            background: white;
            border-radius: 20px;
            padding: 32px 28px;
            width: 100%;
            max-width: 380px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .logo {
            font-size: 4em;
            margin-bottom: 18px;
        }
        
        .title {
            font-size: 1.6em;
            font-weight: 600;
            color: #333;
            margin-bottom: 28px;
        }
        
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        
        .form-group label {
            display: block;
            font-size: 14px;
            color: #555;
            margin-bottom: 8px;
            font-weight: 500;
        }
        
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.2s;
            box-sizing: border-box;
            -webkit-appearance: none;
            background: #fafafa;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            background: white;
        }
        
        .form-group input::placeholder {
            color: #999;
        }
        
        .btn-login {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 12px;
            touch-action: manipulation;
        }
        
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }
        
        .btn-login:active {
            transform: translateY(0);
        }
        
        .error-message {
            background: #ffebee;
            color: #c62828;
            padding: 12px 15px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 18px;
            display: none;
            border-left: 3px solid #ef5350;
        }
        
        .footer {
            margin-top: 24px;
            font-size: 12px;
            color: #999;
        }
        
        /* 手机适配 - 480px以下 */
        @media (max-width: 480px) {
            body {
                padding: 12px;
                align-items: flex-start;
                padding-top: 50px;
            }
            
            .login-container {
                padding: 28px 22px;
                border-radius: 16px;
            }
            
            .logo {
                font-size: 3.2em;
                margin-bottom: 14px;
            }
            
            .title {
                font-size: 1.4em;
                margin-bottom: 22px;
            }
            
            .form-group {
                margin-bottom: 16px;
            }
            
            .form-group input {
                padding: 15px 14px;
                font-size: 16px;
                border-radius: 8px;
            }
            
            .btn-login {
                padding: 15px;
                font-size: 16px;
                border-radius: 8px;
            }
        }
        
        /* 超小屏幕 - 360px以下 */
        @media (max-width: 360px) {
            body {
                padding: 10px;
                padding-top: 30px;
            }
            
            .login-container {
                padding: 22px 18px;
            }
            
            .logo {
                font-size: 2.8em;
            }
            
            .title {
                font-size: 1.3em;
            }
            
            .form-group input {
                padding: 13px 12px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">🏮</div>
        <h1 class="title">燃香样式判断</h1>
        
        <div class="error-message" id="errorMsg">用户名或密码错误</div>
        
        <form id="loginForm">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="username" placeholder="请输入用户名" required>
            </div>
            
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="password" placeholder="请输入密码" required>
            </div>
            
            <button type="submit" class="btn-login">登录</button>
        </form>
        
        <div class="footer">
            <p>请输入用户名和密码登录</p>
        </div>
    </div>

    <script src="users.js"></script>
    <script>
        // 预设的超级管理员账号
        const ADMIN_USER = '13371053199';
        const ADMIN_PASS = 'chengyu2003';
        
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            
            // 验证超级管理员登录
            if (username === ADMIN_USER && password === ADMIN_PASS) {
                // 登录成功，设置sessionStorage和localStorage
                sessionStorage.setItem('loggedIn', 'true');
                sessionStorage.setItem('username', username);
                sessionStorage.setItem('isAdmin', 'true');
                
                // 同时设置localStorage供admin页面使用
                localStorage.setItem('incense_token', JSON.stringify({
                    username: username,
                    name: '超级管理员',
                    role: 'super_admin'
                }));
                
                window.location.href = 'incense_search.html';
            } else {
                // 验证普通用户登录（使用 incense_users 键）
                const users = JSON.parse(localStorage.getItem('incense_users') || '[]');
                const user = users.find(u => u.username === username && u.password === password);
                
                if (user) {
                    sessionStorage.setItem('loggedIn', 'true');
                    sessionStorage.setItem('username', username);
                    sessionStorage.setItem('isAdmin', user.role === 'admin' || user.role === 'super_admin' ? 'true' : 'false');
                    
                    // 同时设置localStorage供admin页面使用
                    localStorage.setItem('incense_token', JSON.stringify({
                        username: user.username,
                        name: user.name,
                        role: user.role
                    }));
                    
                    window.location.href = 'incense_search.html';
                } else {
                    // 登录失败
                    errorMsg.style.display = 'block';
                    setTimeout(() => {
                        errorMsg.style.display = 'none';
                    }, 3000);
                }
            }
        });
    </script>
</body>
</html>
